<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… — Shengfu Zhang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/base16/tomorrow.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg:   #f6f3ec;
      --surf: #ede9e0;
      --c:    #1c6454;
      --cm:   rgba(28,100,84,.15);
      --cl:   rgba(28,100,84,.06);
      --muted: rgba(28,100,84,.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--c);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      display: grid;
      grid-template-columns: 36px 1fr 36px;
    }

    /* ── Sidebars ── */
    .sidebar {
      border-right: 1px solid var(--cm);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .sidebar-r { border-right: none; border-left: 1px solid var(--cm); }

    .sidebar-text {
      font-family: 'DM Mono', monospace;
      font-size: .5rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--c);
      opacity: .3;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      flex: 1;
      display: flex;
      align-items: center;
    }

    /* ── Main ── */
    main {
      padding: 2rem 3rem 6rem;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Back nav ── */
    .back-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.8rem;
      border-bottom: 1px solid var(--cm);
    }

    .back-link {
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      color: var(--c);
      border: 1px solid var(--c);
      border-radius: 100px;
      padding: .22rem .85rem;
      text-decoration: none;
      opacity: .6;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      transition: opacity .15s, background .15s;
    }
    .back-link:hover { opacity: 1; background: var(--cl); }

    /* ── Post header ── */
    .post-header {
      padding: 2.5rem 0 2rem;
      border-bottom: 1px solid var(--cm);
    }

    .post-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 5vw, 3rem);
      line-height: 1.05;
      letter-spacing: -.02em;
      text-transform: uppercase;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--c);
    }

    .post-meta {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--c);
      opacity: .45;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: .7rem;
      flex-wrap: wrap;
    }

    .post-tags { display: flex; gap: .35rem; flex-wrap: wrap; margin-top: .8rem; }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: .58rem;
      letter-spacing: .04em;
      color: var(--c);
      border: 1px solid var(--c);
      border-radius: 100px;
      padding: .1rem .55rem;
      opacity: .45;
    }

    /* ── Article body ── */
    .article {
      padding-top: 2.5rem;
    }

    .article p {
      font-size: 1rem;
      line-height: 1.82;
      color: var(--c);
      opacity: .85;
      margin-bottom: 1.4em;
    }

    .article h1, .article h2, .article h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: var(--c);
      margin: 2.2em 0 .7em;
      line-height: 1.15;
      letter-spacing: -.01em;
    }

    .article h2 { font-size: 1.25rem; }
    .article h3 { font-size: 1rem; opacity: .75; }

    .article h2::before {
      content: '= ';
      font-family: 'DM Mono', monospace;
      font-size: .85em;
      opacity: .4;
    }

    .article strong { font-weight: 500; opacity: 1; color: var(--c); }
    .article em { font-style: italic; }

    .article a {
      color: var(--c);
      text-underline-offset: 2px;
    }

    .article hr {
      border: none;
      border-top: 1px solid var(--cm);
      margin: 2.2em 0;
    }

    .article blockquote {
      border-left: 2px solid var(--c);
      padding: .7rem 1.2rem;
      margin: 1.8em 0;
      opacity: .65;
    }
    .article blockquote p { margin: 0; }

    .article ul, .article ol {
      padding-left: 1.4em;
      margin-bottom: 1.4em;
    }
    .article li { margin-bottom: .35em; line-height: 1.75; font-size: 1rem; opacity: .85; }

    .article :not(pre) > code {
      font-family: 'DM Mono', monospace;
      font-size: .85em;
      background: var(--surf);
      border: 1px solid var(--cm);
      padding: .1em .4em;
      border-radius: 3px;
    }

    .article pre {
      background: var(--surf) !important;
      border: 1px solid var(--cm);
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
      overflow-x: auto;
      margin: 1.6em 0;
      font-size: .85rem;
    }

    .article pre code {
      background: none !important;
      border: none !important;
      padding: 0 !important;
      font-family: 'DM Mono', monospace !important;
    }

    .article .mermaid {
      background: var(--surf);
      border: 1px solid var(--cm);
      border-radius: 6px;
      padding: 1.5rem;
      margin: 1.8em 0;
      text-align: center;
    }

    /* ── Footer ── */
    .post-footer {
      margin-top: 3.5rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--cm);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copy {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      color: var(--c);
      opacity: .3;
    }

    #loading {
      padding: 3rem 0;
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      letter-spacing: .1em;
      color: var(--c);
      opacity: .35;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      body { grid-template-columns: 0 1fr 0; }
      .sidebar { display: none; }
      main { padding: 1.5rem 1.4rem 4rem; }
      .post-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-text">shengfu zhang · writing</div>
</aside>

<main>
  <nav class="back-nav">
    <a class="back-link" href="index.html">← Writing</a>
    <span style="font-family:'DM Mono',monospace;font-size:.6rem;opacity:.3;letter-spacing:.05em">shengfu-zhang.github.io/shengfu-blog</span>
  </nav>

  <div id="post-header" class="post-header" style="display:none">
    <div class="post-title" id="post-title"></div>
    <div class="post-meta" id="post-meta"></div>
    <div class="post-tags" id="post-tags"></div>
  </div>

  <div id="loading">Loading…</div>
  <article class="article" id="article" style="display:none"></article>

  <footer class="post-footer" id="post-footer" style="display:none">
    <a class="back-link" href="index.html">← All posts</a>
    <span class="footer-copy">Shengfu Zhang · 2026</span>
  </footer>
</main>

<aside class="sidebar sidebar-r">
  <div class="sidebar-text">stay curious · build things</div>
</aside>

<script>
  // Post metadata — keyed by slug
  const POSTS = {
    '2026-03-ai-velocity': {
      title: 'We Sped Up the Wrong Part',
      date: 'March 2026',
      tags: ['AI', 'Engineering', 'Productivity'],
    },
  };

  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      background: '#ede9e0',
      primaryColor: '#e0dbd0',
      primaryTextColor: '#1c6454',
      lineColor: 'rgba(28,100,84,.4)',
      edgeLabelBackground: '#ede9e0',
    }
  });

  const renderer = new marked.Renderer();
  renderer.code = function(token) {
    const lang = (token.lang || '').trim();
    if (lang === 'mermaid') return `<div class="mermaid">${token.text}</div>`;
    const hl = lang && hljs.getLanguage(lang)
      ? hljs.highlight(token.text, { language: lang }).value
      : hljs.highlightAuto(token.text).value;
    return `<pre><code class="hljs">${hl}</code></pre>`;
  };
  marked.use({ renderer, breaks: true, gfm: true });

  function readTime(text) {
    return Math.max(1, Math.round(text.trim().split(/\s+/).length / 200)) + ' min read';
  }

  function stripH1(md) {
    return md.replace(/^#\s+.+\n?/m, '').trim();
  }

  async function load() {
    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) { document.getElementById('loading').textContent = 'No post specified.'; return; }

    const meta = POSTS[slug];
    if (!meta) { document.getElementById('loading').textContent = 'Post not found.'; return; }

    try {
      const res = await fetch(`posts/${slug}/blog.md`);
      if (!res.ok) throw new Error(res.status);
      const md = await res.text();

      // Fill header
      document.title = meta.title + ' — Shengfu Zhang';
      document.getElementById('post-title').textContent = meta.title;
      document.getElementById('post-meta').textContent = meta.date + ' · ' + readTime(md);

      const tagsEl = document.getElementById('post-tags');
      meta.tags.forEach(t => {
        const s = document.createElement('span');
        s.className = 'tag'; s.textContent = t;
        tagsEl.appendChild(s);
      });

      document.getElementById('post-header').style.display = '';
      document.getElementById('article').innerHTML = marked.parse(stripH1(md));
      document.getElementById('article').style.display = '';
      document.getElementById('post-footer').style.display = '';
      document.getElementById('loading').style.display = 'none';

      await mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
    } catch(e) {
      document.getElementById('loading').textContent = 'Failed to load post.';
      console.error(e);
    }
  }

  load();
</script>
</body>
</html>
